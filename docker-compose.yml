version: "3.9"

# ─────────────────────────────────────────────────────
# MediaForensics Platform — Docker Compose
# Services: backend | frontend | ml-worker | mongodb | redis
# ─────────────────────────────────────────────────────

services:

  # ── MongoDB ────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mediaforensics-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mediaforensics
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ──────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: mediaforensics-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediaforensics-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── ML Celery Worker ──────────────────────────────
  ml-worker:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: mediaforensics-ml-worker
    restart: unless-stopped
    volumes:
      - ./ml:/app
      - ./uploads:/app/uploads
      - ./ml/weights:/app/weights
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Remove the deploy block above if you don't have a GPU

  # ── React Frontend ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediaforensics-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
    driver: local
